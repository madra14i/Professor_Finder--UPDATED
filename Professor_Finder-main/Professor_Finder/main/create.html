<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Create Account</title>

		<link rel="stylesheet" href="../css/create.css" />

		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<link
			href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;700&display=swap"
			rel="stylesheet"
		/>
	</head>

	<body>

		<!-- Background -->
		<img src="../assets/images/bg.jpg" id="cvsu-bg" alt="Background" />

		<div class="container">

			<!-- Decorative dots -->
			<span class="dot1"></span>
			<span class="dot2"></span>
			<span class="dot3"></span>
			<span class="dot4"></span>
			<span class="dot5"></span>
			<span class="dot6"></span>
			<span class="dot7"></span>
			<span class="dot8"></span>

			<!-- Logo section -->
			<div class="logo-box">

				<img
					src="../assets/images/logo.png"
					id="cvsu-logo"
					alt="CvSU Logo"
				/>

				<svg width="500" height="100">
					<text
						x="50%"
						y="50%"
						text-anchor="middle"
						dominant-baseline="middle"
						class="cvsu-main"
					>
						CvSU-MAIN
					</text>
				</svg>

				<svg width="500" height="100">
					<text
						x="50%"
						y="30%"
						text-anchor="middle"
						dominant-baseline="middle"
						class="prof-finder"
					>
						Professor Finder
					</text>
				</svg>

			</div>

			<!-- Create account box -->
			<div class="create-transp-box">

				<h1>Create Account</h1>

				<form class="input-form">

					<!-- Full Name -->
					<div class="inpName">
						<label>
							<i class="person-icon">
								<img src="../assets/images/icons/person-icon.svg" alt="" />
							</i>

							<input
								type="text"
								id="full-name"
								placeholder="FULL NAME"
								required
							/>
						</label>
					</div>

					<!-- Email -->
					<div class="inpEmail">
						<label>
							<i class="email-icon">
								<img src="../assets/images/icons/email-icon.svg" alt="" />
							</i>

							<input
								type="email"
								id="cvsu-email"
								placeholder="CVSU EMAIL"
								required
							/>
						</label>
					</div>

					<!-- Student Number -->
					<div class="inpStudennt-num">
						<label>
							<i class="studnum-icon">
								<img src="../assets/images/icons/person-icon.svg" alt="" />
							</i>

							<input
								type="text"
								id="Student-num"
								maxlength="9"
								placeholder="STUDENT NUMBER"
								required
							/>
						</label>
					</div>

					<!-- Password -->
					<div class="inpPass">
						<label>
							<i class="pass-icon">
								<img src="../assets/images/icons/password-icon.svg" alt="" />
							</i>

							<input
								type="password"
								id="password"
								placeholder="PASSWORD"
								required
							/>
						</label>
					</div>

					<!-- Terms -->
					<div class="terms-con">
						<label>
							<input type="checkbox" id="terms" required />
							<a href="#">
								I AGREE TO THE TERMS AND CONDITIONS
							</a>
						</label>
					</div>

					<!-- Submit -->
					<div class="create-btn">
						<button type="submit" id="create-btn">
							CREATE ACCOUNT
						</button>
					</div>

					<!-- Login link -->
					<div class="have-account">
						<p>
							Already have an account?
							<a href="index.html">Sign in</a>
						</p>
					</div>

				</form>

			</div>

		</div>

	</body>
</html>
